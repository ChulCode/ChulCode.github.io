baseURL = 'https://chulcode.github.io/'
languageCode = 'ko'
title = "ChulCode | AI 기획자의 기술 블로그"
theme = 'PaperMod'
paginate = 5
enableRobotsTXT = true

[params]
  author = "Chul Kim"
  description = "AI 기획자의 기술 성장 기록 — LLM, Agent, RAG 실습 노트"
  keywords = ["AI", "LLM", "RAG", "Agent", "기술블로그"]
  DateFormat = "2006-01-02"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowShareButtons = false

  [params.homeInfoParams]
